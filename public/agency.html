<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostAI — Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #09080a;
      --surface:   #120f14;
      --border:    #231f26;
      --border-hi: #3a3040;
      --gold:      #c9a84c;
      --gold-dim:  #7a6228;
      --text:      #e8ddd8;
      --muted:     #6b5f68;
      --danger:    #c25555;
      --ig:        #e1306c;
      --tt:        #69c9d0;
      --li:        #0a66c2;
      --yt:        #ff0000;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
    }

    #login-screen::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      background: var(--surface);
      padding: 48px 40px;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .login-logo .sub {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }

    .field-group { margin-bottom: 20px; }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      border-radius: 0;
      -webkit-appearance: none;
    }

    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      color: #09080a;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .login-error {
      background: rgba(194,85,85,0.1);
      border: 1px solid rgba(194,85,85,0.3);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--danger);
      margin-top: 16px;
      display: none;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(9,8,10,0.3);
      border-top-color: #09080a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(9,8,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .topbar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .topbar-logo span {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 12px;
      vertical-align: middle;
    }

    .topbar-right { display: flex; align-items: center; gap: 20px; }

    .topbar-user {
      font-size: 11px;
      color: var(--muted);
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      padding: 6px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

    .main { max-width: 960px; margin: 0 auto; padding: 48px 40px; }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }

    .page-title em {
      display: block;
      font-style: italic;
      color: var(--gold);
    }

    .page-count {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* add client form */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      padding: 28px 32px;
      margin-bottom: 40px;
    }

    .add-section-title {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .add-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .add-row .field-group { margin-bottom: 0; flex: 1; min-width: 180px; }

    .btn-add {
      padding: 12px 28px;
      background: var(--gold);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      color: #09080a;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-add .spinner { border-color: rgba(9,8,10,0.3); border-top-color: #09080a; }

    /* clients */
    .clients-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .client-card {
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .client-card:hover { border-color: var(--border-hi); }

    .client-head {
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      user-select: none;
    }

    .client-head-left { flex: 1; min-width: 0; }

    .client-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .client-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }

    .client-segment {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .platform-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .platform-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-hi);
      transition: background 0.2s;
    }
    .platform-dot.connected { background: var(--gold); }
    .platform-dot[data-p="INSTAGRAM"].connected { background: var(--ig); }
    .platform-dot[data-p="TIKTOK"].connected    { background: var(--tt); }
    .platform-dot[data-p="LINKEDIN"].connected  { background: var(--li); }
    .platform-dot[data-p="YOUTUBE"].connected   { background: var(--yt); }

    .client-head-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .btn-remove {
      background: none;
      border: 1px solid transparent;
      padding: 6px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); }

    .toggle-icon {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.25s;
    }
    .client-card.open .toggle-icon { transform: rotate(180deg); }

    /* platforms panel */
    .platforms-panel {
      border-top: 1px solid var(--border);
      display: none;
      padding: 24px 28px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .client-card.open .platforms-panel { display: flex; }

    .platform-tile {
      flex: 1;
      min-width: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .platform-tile.is-connected { border-color: var(--border-hi); }

    .platform-tile-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .platform-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .pi-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .pi-tiktok    { background: #000; border: 1px solid #333; }
    .pi-linkedin  { background: #0a66c2; }
    .pi-youtube   { background: #ff0000; }

    .platform-name {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 500;
    }

    .platform-status {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.4;
    }

    .platform-status.ok { color: #4a9e6b; }

    .btn-connect {
      padding: 8px 14px;
      border: 1px solid var(--gold-dim);
      background: none;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      width: 100%;
    }
    .btn-connect:hover { background: rgba(201,168,76,0.07); border-color: var(--gold); }

    .btn-disconnect {
      padding: 8px 14px;
      border: 1px solid rgba(194,85,85,0.25);
      background: none;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      width: 100%;
    }
    .btn-disconnect:hover { color: var(--danger); border-color: var(--danger); }

    /* empty */
    .empty {
      text-align: center;
      padding: 64px 24px;
      border: 1px dashed var(--border);
    }

    .empty-icon {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 400;
      font-style: italic;
      color: var(--border-hi);
      margin-bottom: 16px;
    }

    .empty p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      padding: 14px 20px;
      font-size: 12px;
      color: var(--text);
      z-index: 999;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.err { border-left-color: var(--danger); color: var(--danger); }

    /* loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      height: 80px;
      border: 1px solid var(--border);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* notification banner */
    .banner {
      padding: 12px 40px;
      font-size: 11px;
      letter-spacing: 0.1em;
      display: none;
      align-items: center;
      gap: 12px;
    }
    .banner.success { background: rgba(74,158,107,0.1); border-bottom: 1px solid rgba(74,158,107,0.2); color: #4a9e6b; }
    .banner.error   { background: rgba(194,85,85,0.08); border-bottom: 1px solid rgba(194,85,85,0.2); color: var(--danger); }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .main { padding: 32px 16px; }
      .add-section { padding: 20px 16px; }
      .client-head { padding: 16px; }
      .platforms-panel { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>PostAI</h1>
      <div class="sub">Agency Command Center</div>
    </div>

    <form id="login-form">
      <div class="field-group">
        <label class="field-label" for="l-email">E-mail</label>
        <input id="l-email" type="email" placeholder="seu@email.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label class="field-label" for="l-pass">Senha</label>
        <input id="l-pass" type="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <div class="login-error" id="login-error"></div>

      <button type="submit" class="btn-primary" id="login-btn" style="margin-top:24px">
        <span id="login-text">Entrar</span>
        <div class="spinner" id="login-spinner"></div>
      </button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="banner" id="banner"></div>

  <div class="topbar">
    <div class="topbar-logo">
      PostAI <span>Agency</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-ghost" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">
        Clientes
        <em>Agency</em>
      </div>
      <div class="page-count" id="page-count"></div>
    </div>

    <!-- add form -->
    <div class="add-section">
      <div class="add-section-title">+ Novo Cliente</div>
      <form id="add-form">
        <div class="add-row">
          <div class="field-group">
            <label class="field-label" for="c-name">Nome *</label>
            <input id="c-name" type="text" placeholder="Ex: Clínica Bem Estar" required />
          </div>
          <div class="field-group">
            <label class="field-label" for="c-seg">Segmento</label>
            <input id="c-seg" type="text" placeholder="Ex: Saúde, Moda..." />
          </div>
          <button type="submit" class="btn-add" id="add-btn">
            <span id="add-text">Cadastrar</span>
            <div class="spinner" id="add-spinner"></div>
          </button>
        </div>
      </form>
    </div>

    <!-- list -->
    <div id="clients-list">
      <div class="skeleton"></div>
      <div class="skeleton" style="margin-top:12px;opacity:.6"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://postai-production-a966.up.railway.app';
  const PLATFORMS = [
    { id: 'instagram', label: 'Instagram', icon: '📸', cls: 'pi-instagram', key: 'INSTAGRAM' },
    { id: 'tiktok',    label: 'TikTok',    icon: '🎵', cls: 'pi-tiktok',    key: 'TIKTOK'    },
    { id: 'linkedin',  label: 'LinkedIn',  icon: '💼', cls: 'pi-linkedin',  key: 'LINKEDIN'  },
    { id: 'youtube',   label: 'YouTube',   icon: '▶',  cls: 'pi-youtube',   key: 'YOUTUBE'   },
  ];

  let token = localStorage.getItem('postai_token');
  let user  = JSON.parse(localStorage.getItem('postai_user') || 'null');

  // ── Handle OAuth return ──
  const params = new URLSearchParams(location.search);
  const connectedPlatform = params.get('connected');
  const oauthError        = params.get('error');
  history.replaceState({}, '', '/agency.html');

  // ── Toast ──
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = 'toast', 3500);
  }

  // ── Auth ──
  function logout() {
    localStorage.removeItem('postai_token');
    localStorage.removeItem('postai_user');
    token = null; user = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
    });
    if (res.status === 401) { logout(); throw new Error('Sessão expirada'); }
    return res;
  }

  // ── Login ──
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const txt = document.getElementById('login-text');
    const sp  = document.getElementById('login-spinner');
    const err = document.getElementById('login-error');

    btn.disabled = true; txt.style.display = 'none'; sp.style.display = 'block'; err.style.display = 'none';

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('l-email').value.trim(), password: document.getElementById('l-pass').value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Falha ao autenticar');

      token = data.accessToken;
      user  = data.user ?? null;
      localStorage.setItem('postai_token', token);
      localStorage.setItem('postai_user', JSON.stringify(user));
      enterDashboard();
    } catch (ex) {
      err.textContent = ex.message;
      err.style.display = 'block';
      btn.disabled = false; txt.style.display = 'block'; sp.style.display = 'none';
    }
  });

  function enterDashboard() {
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('dashboard').style.display = 'block';
    if (user) document.getElementById('topbar-user').textContent = user.name;

    if (connectedPlatform) {
      showBanner(`✓ ${connectedPlatform} conectado com sucesso.`, false);
    } else if (oauthError) {
      showBanner(`Erro ao conectar: ${oauthError}`, true);
    }

    loadClients();
  }

  function showBanner(msg, isErr) {
    const el = document.getElementById('banner');
    el.textContent = msg;
    el.className = 'banner ' + (isErr ? 'error' : 'success');
    el.style.display = 'flex';
    setTimeout(() => el.style.display = 'none', 6000);
  }

  // ── Load clients + connections ──
  async function loadClients() {
    try {
      const [clientsRes, connsRes] = await Promise.all([
        apiFetch('/agency/clients'),
        apiFetch('/oauth/connections'),
      ]);
      const { clients = [] }     = await clientsRes.json();
      const { connections = [] } = await connsRes.json();

      // global connections (no client_id)
      const globalConns = Object.fromEntries(connections.map(c => [c.platform, c]));

      // per-client connections: load in parallel
      const clientConns = await Promise.all(
        clients.map(c =>
          apiFetch(`/oauth/connections?client_id=${c.id}`)
            .then(r => r.json())
            .then(d => ({ clientId: c.id, conns: Object.fromEntries((d.connections || []).map(x => [x.platform, x])) }))
        )
      );
      const connMap = Object.fromEntries(clientConns.map(x => [x.clientId, x.conns]));

      renderClients(clients, connMap);
    } catch {
      renderClients([], {});
    }
  }

  function renderClients(clients, connMap) {
    const list = document.getElementById('clients-list');
    document.getElementById('page-count').textContent =
      clients.length === 0 ? '' : `${clients.length} cliente${clients.length > 1 ? 's' : ''}`;

    if (clients.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">Nenhum</div><p>Cadastre o primeiro cliente acima</p></div>`;
      return;
    }

    list.innerHTML = '';
    clients.forEach((client, i) => {
      const conns = connMap[client.id] || {};
      const card  = buildClientCard(client, conns, i);
      list.appendChild(card);
    });
  }

  function buildClientCard(client, conns, idx) {
    const card = document.createElement('div');
    card.className = 'client-card';
    card.id = `card-${client.id}`;
    card.style.animationDelay = `${idx * 60}ms`;

    const connectedCount = PLATFORMS.filter(p => conns[p.key]?.connected).length;

    card.innerHTML = `
      <div class="client-head" onclick="toggleCard('${client.id}')">
        <div class="client-head-left">
          <div class="client-name">${esc(client.name)}</div>
          <div class="client-meta">
            ${client.segment ? `<span class="client-segment">${esc(client.segment)}</span>` : ''}
            <div class="platform-dots">
              ${PLATFORMS.map(p => `<div class="platform-dot ${conns[p.key]?.connected ? 'connected' : ''}" data-p="${p.key}" title="${p.label}"></div>`).join('')}
            </div>
            <span style="font-size:10px;color:var(--muted)">${connectedCount}/4 plataformas</span>
          </div>
        </div>
        <div class="client-head-right">
          <button class="btn-remove" onclick="removeClient(event,'${client.id}','${esc(client.name)}')">Remover</button>
          <span class="toggle-icon">▼</span>
        </div>
      </div>
      <div class="platforms-panel">
        ${PLATFORMS.map(p => buildPlatformTile(client.id, p, conns[p.key])).join('')}
      </div>`;

    return card;
  }

  function buildPlatformTile(clientId, platform, conn) {
    const connected = conn?.connected;
    const accountName = conn?.accountName || '';
    return `
      <div class="platform-tile ${connected ? 'is-connected' : ''}" id="tile-${clientId}-${platform.id}">
        <div class="platform-tile-top">
          <div class="platform-icon ${platform.cls}">${platform.icon}</div>
          <div>
            <div class="platform-name">${platform.label}</div>
            <div class="platform-status ${connected ? 'ok' : ''}">${connected ? accountName || 'Conectado' : 'Não conectado'}</div>
          </div>
        </div>
        ${connected
          ? `<button class="btn-disconnect" onclick="disconnectPlatform('${clientId}','${platform.id}','${platform.key}')">Desconectar</button>`
          : `<button class="btn-connect" onclick="connectPlatform('${clientId}','${platform.id}')">+ Conectar</button>`
        }
      </div>`;
  }

  function toggleCard(clientId) {
    const card = document.getElementById(`card-${clientId}`);
    card.classList.toggle('open');
  }

  // ── Add client ──
  document.getElementById('add-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('add-btn');
    const txt = document.getElementById('add-text');
    const sp  = document.getElementById('add-spinner');

    btn.disabled = true; txt.style.display = 'none'; sp.style.display = 'block';

    const name    = document.getElementById('c-name').value.trim();
    const segment = document.getElementById('c-seg').value.trim();

    try {
      const res = await apiFetch('/agency/clients', {
        method: 'POST',
        body: JSON.stringify({ name, segment: segment || undefined }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao cadastrar');

      document.getElementById('c-name').value = '';
      document.getElementById('c-seg').value  = '';
      toast(`✓ "${name}" cadastrado`);
      loadClients();
    } catch (ex) {
      toast(ex.message, true);
    } finally {
      btn.disabled = false; txt.style.display = 'block'; sp.style.display = 'none';
    }
  });

  // ── Remove client ──
  async function removeClient(e, id, name) {
    e.stopPropagation();
    if (!confirm(`Remover "${name}"? Esta ação não pode ser desfeita.`)) return;
    try {
      const res = await apiFetch(`/agency/clients/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Erro ao remover');
      toast(`"${name}" removido`);
      loadClients();
    } catch (ex) {
      toast(ex.message, true);
    }
  }

  // ── Connect platform ──
  async function connectPlatform(clientId, platformSlug) {
    try {
      const res  = await apiFetch(`/oauth/${platformSlug}/connect?client_id=${clientId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro');
      window.location.href = data.url;
    } catch (ex) {
      toast(ex.message, true);
    }
  }

  // ── Disconnect platform ──
  async function disconnectPlatform(clientId, platformSlug, platformKey) {
    if (!confirm(`Desconectar ${platformSlug}?`)) return;
    try {
      const res = await apiFetch(`/oauth/${platformSlug}/disconnect?client_id=${clientId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Erro ao desconectar');
      toast(`${platformSlug} desconectado`);
      loadClients();
    } catch (ex) {
      toast(ex.message, true);
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ──
  if (token) {
    enterDashboard();
  }
</script>
</body>
</html>
