<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostAI — Painel Agency</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #25D366, #128C7E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: #888; font-size: 14px; margin-top: 6px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #25D366; }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sm {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-sm:hover { opacity: 0.85; }

    .btn-danger {
      background: #3a1010;
      color: #ff6b6b;
      border: 1px solid #5a2020;
    }

    .btn-green {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
    }

    .error {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: #ff6b6b;
      margin-top: 16px;
      display: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Dashboard ── */
    #dashboard { display: none; max-width: 720px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #25D366, #128C7E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 14px; color: #888; }

    .logout-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: #555; color: #ccc; }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 16px;
    }

    /* Add client form */
    .add-form {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .add-form-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .add-form-row .field { flex: 1; min-width: 160px; }
    .add-form-row label { margin-top: 0; }
    .add-form-row .btn { margin-top: 0; width: auto; padding: 12px 24px; flex-shrink: 0; }

    /* Clients list */
    .clients-list { display: flex; flex-direction: column; gap: 12px; }

    .client-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .client-card:hover { border-color: #3a3a3a; }

    .client-info { flex: 1; min-width: 0; }
    .client-name { font-size: 16px; font-weight: 600; }
    .client-meta { font-size: 13px; color: #666; margin-top: 4px; }

    .client-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #555;
      background: #1a1a1a;
      border: 1px dashed #2a2a2a;
      border-radius: 12px;
    }
    .empty-state p { font-size: 15px; margin-top: 8px; }

    .tag {
      display: inline-block;
      background: #0d2218;
      border: 1px solid #1a4a2a;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      color: #25D366;
      margin-right: 4px;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      color: #f0f0f0;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: #25D366; color: #25D366; }
    .toast.error { border-color: #5a2020; color: #ff6b6b; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="card">
    <div class="logo">
      <h1>PostAI</h1>
      <p>Painel Agency — Gestão de Clientes</p>
    </div>
    <form id="login-form">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com" required />

      <label for="password">Senha</label>
      <input id="password" type="password" placeholder="Sua senha" required />

      <div class="error" id="login-error"></div>

      <button type="submit" class="btn" id="login-btn">
        <span id="login-text">Entrar</span>
        <div class="spinner" id="login-spinner"></div>
      </button>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="header">
    <h1>PostAI Agency</h1>
    <div class="header-right">
      <span class="user-name" id="user-name"></span>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>

  <!-- Add client -->
  <div class="add-form">
    <div class="section-title">Adicionar cliente</div>
    <form id="add-form">
      <div class="add-form-row">
        <div class="field">
          <label for="client-name">Nome do cliente *</label>
          <input id="client-name" type="text" placeholder="Ex: Clínica Saúde Total" required />
        </div>
        <div class="field">
          <label for="client-segment">Segmento</label>
          <input id="client-segment" type="text" placeholder="Ex: Saúde, Moda..." />
        </div>
        <button type="submit" class="btn btn-green" id="add-btn">
          <span id="add-text">+ Adicionar</span>
          <div class="spinner" id="add-spinner"></div>
        </button>
      </div>
    </form>
  </div>

  <!-- Clients list -->
  <div class="section-title" id="clients-count">Clientes</div>
  <div class="clients-list" id="clients-list">
    <div class="empty-state">
      <div>👥</div>
      <p>Carregando clientes...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://postai-production-a966.up.railway.app';
  let token = localStorage.getItem('postai_token');
  let currentUser = null;

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function logout() {
    localStorage.removeItem('postai_token');
    localStorage.removeItem('postai_user');
    token = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // ── Login ──
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const text = document.getElementById('login-text');
    const spinner = document.getElementById('login-spinner');
    const errorEl = document.getElementById('login-error');

    btn.disabled = true;
    text.style.display = 'none';
    spinner.style.display = 'block';
    errorEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao entrar.');

      token = data.accessToken;
      localStorage.setItem('postai_token', token);
      currentUser = data.user ?? null;
      localStorage.setItem('postai_user', JSON.stringify(currentUser));
      enterDashboard();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      text.style.display = 'block';
      spinner.style.display = 'none';
    }
  });

  function enterDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    if (currentUser) document.getElementById('user-name').textContent = currentUser.name;
    loadClients();
  }

  // ── Clients ──
  async function loadClients() {
    try {
      const res = await fetch(`${API}/agency/clients`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderClients(data.clients || []);
    } catch {
      renderClients([]);
    }
  }

  function renderClients(clients) {
    const list = document.getElementById('clients-list');
    const count = document.getElementById('clients-count');
    count.textContent = `Clientes (${clients.length})`;

    if (clients.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div style="font-size:32px">👥</div>
          <p>Nenhum cliente cadastrado ainda.<br>Adicione o primeiro acima!</p>
        </div>`;
      return;
    }

    list.innerHTML = clients.map(c => `
      <div class="client-card" id="client-${c.id}">
        <div class="client-info">
          <div class="client-name">${esc(c.name)}</div>
          <div class="client-meta">
            ${c.segment ? `<span class="tag">${esc(c.segment)}</span>` : ''}
            ${c.tokens && c.tokens.length > 0
              ? c.tokens.map(t => `<span class="tag">${esc(t.platform)}</span>`).join('')
              : '<span style="color:#555;font-size:12px">Sem plataformas conectadas</span>'}
          </div>
        </div>
        <div class="client-actions">
          <button class="btn-sm btn-danger" onclick="deleteClient('${c.id}', '${esc(c.name)}')">Remover</button>
        </div>
      </div>
    `).join('');
  }

  // ── Add client ──
  document.getElementById('add-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('add-btn');
    const text = document.getElementById('add-text');
    const spinner = document.getElementById('add-spinner');

    btn.disabled = true;
    text.style.display = 'none';
    spinner.style.display = 'block';

    const name = document.getElementById('client-name').value.trim();
    const segment = document.getElementById('client-segment').value.trim();

    try {
      const res = await fetch(`${API}/agency/clients`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ name, segment: segment || undefined }),
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao adicionar.');

      document.getElementById('client-name').value = '';
      document.getElementById('client-segment').value = '';
      showToast(`✅ Cliente "${name}" adicionado!`);
      loadClients();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
      text.style.display = 'block';
      spinner.style.display = 'none';
    }
  });

  // ── Delete client ──
  async function deleteClient(id, name) {
    if (!confirm(`Remover o cliente "${name}"? Esta ação não pode ser desfeita.`)) return;

    try {
      const res = await fetch(`${API}/agency/clients/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error('Erro ao remover cliente.');

      showToast(`🗑️ "${name}" removido.`);
      document.getElementById(`client-${id}`)?.remove();
      loadClients();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Auto-login if token exists ──
  if (token) {
    const saved = localStorage.getItem('postai_user');
    currentUser = saved ? JSON.parse(saved) : null;
    enterDashboard();
  }
</script>
</body>
</html>
