name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postai
          POSTGRES_PASSWORD: postai_test
          POSTGRES_DB: postai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postai:postai_test@localhost:5432/postai_test
      NODE_ENV: test
      JWT_SECRET: test-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-chars
      EVOLUTION_API_URL: http://localhost:3001
      EVOLUTION_API_KEY: test-key
      N8N_WEBHOOK_PUBLISH: http://localhost:5678/webhook/postai/publish
      N8N_WEBHOOK_SCHEDULE: http://localhost:5678/webhook/postai/schedule
      N8N_WEBHOOK_RETRY: http://localhost:5678/webhook/postai/retry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run migrations
        run: npm run migrate

      - name: Run unit tests
        run: npm run test:unit -- --coverage

      - name: Run integration tests
        run: npm run test:int

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
